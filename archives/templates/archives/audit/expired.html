<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accès expiré — Archives ENSMG</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center" style="max-width:420px">
    <div class="rounded-circle mx-auto mb-4 d-flex align-items-center justify-content-center"
         style="width:80px;height:80px;background:rgba(220,53,69,.1)">
      <i class="bi bi-shield-x fs-2 text-danger"></i>
    </div>
    <h4 class="fw-bold">Accès expiré ou révoqué</h4>
    <p class="text-muted">Ce lien d'accès auditeur n'est plus valide.<br>
    Contactez l'archiviste de l'ENSMG pour obtenir un nouveau lien.</p>
    <p class="text-muted small">Mission : {{ token.description }}</p>
    <p class="text-muted small">Auditeur : {{ token.auditeur_nom }}</p>
    {% if token.auditeur_email %}
    <a href="mailto:archives@ensmg.sn?subject=Renouvellement accès audit — {{ token.description }}"
       class="btn btn-outline-primary">
      <i class="bi bi-envelope me-1"></i>Demander le renouvellement
    </a>
    {% endif %}
  </div>
</body>
</html>
